name: Validate Semantic Model (.pbip / TMDL)

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-pbip:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tabular Editor (portable)
        run: |
          mkdir te
          curl -L -o te/TE.zip https://github.com/TabularEditor/TabularEditor/releases/latest/download/TabularEditor.Portable.zip
          Expand-Archive -Path te/TE.zip -DestinationPath te
          Get-ChildItem -Recurse te

      - name: Validate TMDL folder loads correctly
        run: |
          $te = Resolve-Path "te/TabularEditor.exe"
          & $te ./Games.SemanticModel/definition --validate

      - name: Create BPA results folder
        run: mkdir bpa-results
      
      - name: Debug BPA rules
        run: |
          Write-Host "Listing bpa-rules folder:"
          Get-ChildItem -Recurse ./bpa-rules

      - name: Run Best Practice Analyzer
        run: |
              $te = Resolve-Path "te/TabularEditor.exe"

              Start-Process -FilePath $te `
              -ArgumentList "./Games.SemanticModel/definition -A ./bpa-rules/BPARules.json" `
              -RedirectStandardOutput "./bpa-results/BPAConsole.txt" `
              -NoNewWindow -Wait

              if ($process.ExitCode -ne 0) {
              Write-Host "Tabular Editor failed with exit code $($process.ExitCode)"
              exit 1
              }

      - name: Build full BPA report
        run: |
         $rules = Get-Content "./bpa-rules/BPARules.json" | ConvertFrom-Json
         $console = Get-Content "./bpa-results/BPAConsole.txt"

         $report = @()

         foreach ($rule in $rules) {
         $id = $rule.ID
         $name = $rule.Name
         $severity = $rule.Severity
         $category = $rule.Category

         # Detect violations
         $violations = $console | Where-Object { $_ -match "violates rule `"$name`"" }

         # Detect rule errors
         $errors = $console | Where-Object { $_ -match "Error on rule '$name'" }

         if ($violations.Count -gt 0) {
            $status = "Failed"
          }
         elseif ($errors.Count -gt 0) {
            $status = "Error"
          }
         else {
            $status = "Passed"
          }

         $report += [PSCustomObject]@{
            ID = $id
            Name = $name
            Category = $category
            Severity = $severity
            Status = $status
            Violations = $violations
            Errors = $errors
          }
         }
         $report | ConvertTo-Json -Depth 10 | Out-File "./bpa-results/BPAFullReport.json"

      
      - name: Upload BPA report
        uses: actions/upload-artifact@v4
        with:
         name: bpa-report
         path: bpa-results/

      - name: Fail if BPA violations found
        run: |
             $report = Get-Content "./bpa-results/BPAFullReport.json" | ConvertFrom-Json
             $failed =  $report | Where-Object { $_.Status -in @("Failed","Error") }

             if ($failed.Count -gt 0) {
             Write-Host "❌ BPA violations detected:"
             $failed | ConvertTo-Json -Depth 10
             exit 1
             }
             Write-Host "✅ No BPA violations found."


      - name: Semantic diff against main
        run: |
          git fetch origin main
          git diff origin/main -- ./Games.SemanticModel/definition > semantic_diff.txt
          if ((Get-Content semantic_diff.txt).Length -gt 0) {
            Write-Host "Semantic differences detected:"
            Get-Content semantic_diff.txt
            exit 1
          }
