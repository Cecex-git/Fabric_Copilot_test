name: Sync to Fabric on Push

on:
  push:
    branches: [ main ]
    paths:
      - 'Games.SemanticModel/**'
  workflow_dispatch:

jobs:
  sync-fabric:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate TMDL structure
        run: |
          ERRORS=0

          # 1. Check definition.pbism exists and has valid JSON with a version field
          PBISM="Games.SemanticModel/definition.pbism"
          if [ ! -f "$PBISM" ]; then
            echo "❌ Missing $PBISM — required by Fabric Git integration"
            ERRORS=1
          elif ! jq -e '.version' "$PBISM" > /dev/null 2>&1; then
            echo "❌ $PBISM is invalid JSON or missing the 'version' field"
            ERRORS=1
          else
            echo "✅ $PBISM present and valid"
          fi

          # 2. Check for description: properties in TMDL (not supported on columns by Fabric)
          MATCHES=$(grep -rn "^\s\+description:" Games.SemanticModel/definition/ --include="*.tmdl" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Found 'description:' properties in TMDL — Fabric does not support this on columns. Use '/// text' doc comments instead:"
            echo "$MATCHES"
            ERRORS=1
          else
            echo "✅ No unsupported 'description:' properties found in TMDL files"
          fi

          # 3. Check database.tmdl has the required Fabric fields
          DB_TMDL="Games.SemanticModel/definition/database.tmdl"
          if [ ! -f "$DB_TMDL" ]; then
            echo "❌ Missing $DB_TMDL — required by Fabric Git integration"
            ERRORS=1
          else
            if ! grep -q "compatibilityMode: powerBI" "$DB_TMDL"; then
              echo "❌ $DB_TMDL is missing 'compatibilityMode: powerBI'"
              ERRORS=1
            else
              echo "✅ compatibilityMode: powerBI present in database.tmdl"
            fi
            if ! grep -q "language:" "$DB_TMDL"; then
              echo "❌ $DB_TMDL is missing a 'language:' field"
              ERRORS=1
            else
              echo "✅ language field present in database.tmdl"
            fi
          fi

          if [ "$ERRORS" -ne 0 ]; then
            echo ""
            echo "❌ Pre-flight validation failed. Fix the issues above before syncing to Fabric."
            exit 1
          fi
          echo ""
          echo "✅ All pre-flight checks passed."

      - name: Get Entra ID token for Service Principal
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
            -d "scope=https://api.fabric.microsoft.com/.default")
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Failed to acquire token"
            echo $RESPONSE | jq .
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure Git credentials for Service Principal
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/git/myGitCredentials" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "source": "ConfiguredConnection",
              "connectionId": "${{ secrets.FABRIC_GIT_CONNECTION_ID }}"
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed to configure Git credentials for Service Principal"
            exit 1
          fi
          echo "✅ Git credentials configured."

      - name: Get current Git status from Fabric
        id: git_status
        run: |
          RESPONSE=$(curl -s -X GET \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/git/status" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Content-Type: application/json")
          echo "Status response: $RESPONSE"

          WORKSPACE_HEAD=$(echo $RESPONSE | jq -r '.workspaceHead')
          REMOTE_HASH=$(echo $RESPONSE | jq -r '.remoteCommitHash')

          # Fail fast if the API returned an error
          if echo "$RESPONSE" | jq -e '.errorCode' > /dev/null 2>&1; then
            echo "❌ Fabric Git status API error:"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "workspace_head=$WORKSPACE_HEAD" >> $GITHUB_OUTPUT
          echo "remote_hash=$REMOTE_HASH" >> $GITHUB_OUTPUT

          if [ "$WORKSPACE_HEAD" = "$REMOTE_HASH" ]; then
            echo "✅ Fabric is already up to date with remote. No sync needed."
            echo "in_sync=true" >> $GITHUB_OUTPUT
          else
            echo "🔄 Changes detected. Sync required."
            echo "in_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Fabric workspace from Git
        if: steps.git_status.outputs.in_sync == 'false'
        run: |
          WORKSPACE_HEAD="${{ steps.git_status.outputs.workspace_head }}"
          REMOTE_HASH="${{ steps.git_status.outputs.remote_hash }}"

          # Build the request body — omit workspaceHead when null
          if [ "$WORKSPACE_HEAD" = "null" ] || [ -z "$WORKSPACE_HEAD" ]; then
            echo "ℹ️ workspaceHead is null — omitting it from updateFromGit request."
            BODY=$(jq -n \
              --arg rch "$REMOTE_HASH" \
              '{remoteCommitHash:$rch,conflictResolution:{conflictResolutionType:"Workspace",conflictResolutionPolicy:"PreferRemote"},options:{allowOverrideItems:true}}')
          else
            BODY=$(jq -n \
              --arg wh "$WORKSPACE_HEAD" \
              --arg rch "$REMOTE_HASH" \
              '{workspaceHead:$wh,remoteCommitHash:$rch,conflictResolution:{conflictResolutionType:"Workspace",conflictResolutionPolicy:"PreferRemote"},options:{allowOverrideItems:true}}')
          fi

          # Capture response headers to get the Location for LRO polling
          RESPONSE=$(curl -s -i -w "\n%{http_code}" -X POST \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/git/updateFromGit" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          LOCATION=$(echo "$RESPONSE" | grep -i "^location:" | awk '{print $2}' | tr -d '\r')

          echo "HTTP status: $HTTP_CODE"
          echo "Operation location: $LOCATION"
          echo "Full response: $RESPONSE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Fabric workspace updated successfully."
          elif [ "$HTTP_CODE" = "202" ]; then
            echo "🔄 Sync accepted as long-running operation. Polling for completion..."
            if [ -z "$LOCATION" ]; then
              echo "❌ No Location header returned — cannot poll operation status."
              exit 1
            fi
            # Poll until succeeded or failed
            for i in $(seq 1 20); do
              sleep 15
              OP=$(curl -s \
                "$LOCATION" \
                -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}")
              STATUS=$(echo "$OP" | jq -r '.status // "unknown"')
              echo "Poll $i — status: $STATUS"
              if [ "$STATUS" = "Succeeded" ]; then
                echo "✅ Fabric workspace sync completed successfully."
                break
              elif [ "$STATUS" = "Failed" ]; then
                echo "❌ Fabric workspace sync failed:"
                echo "$OP" | jq .
                exit 1
              fi
            done
            if [ "$STATUS" != "Succeeded" ]; then
              echo "❌ Timed out waiting for Fabric sync to complete."
              exit 1
            fi
          else
            echo "❌ Unexpected response from Fabric API."
            exit 1
          fi
