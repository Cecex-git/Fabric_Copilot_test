name: Sync to Fabric on Push

on:
  push:
    branches: [ main ]
    paths:
      - 'Games.SemanticModel/**'
  workflow_dispatch:

jobs:
  sync-fabric:
    runs-on: ubuntu-latest

    steps:
      - name: Get Entra ID token for Service Principal
        id: get_token
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${{ secrets.FABRIC_TENANT_ID }}/oauth2/v2.0/token" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.FABRIC_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.FABRIC_CLIENT_SECRET }}" \
            -d "scope=https://api.fabric.microsoft.com/.default")
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Failed to acquire token"
            echo $RESPONSE | jq .
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure Git credentials for Service Principal
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PATCH \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/git/myGitCredentials" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{
              "source": "ConfiguredConnection",
              "connectionId": "${{ secrets.FABRIC_GIT_CONNECTION_ID }}"
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Failed to configure Git credentials for Service Principal"
            exit 1
          fi
          echo "✅ Git credentials configured."

      - name: Get current Git status from Fabric
        id: git_status
        run: |
          RESPONSE=$(curl -s -X GET \
            "https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/git/status" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Content-Type: application/json")
          echo "Status response: $RESPONSE"

          WORKSPACE_HEAD=$(echo $RESPONSE | jq -r '.workspaceHead')
          REMOTE_HASH=$(echo $RESPONSE | jq -r '.remoteCommitHash')

          # Fail fast if the API returned an error
          if echo "$RESPONSE" | jq -e '.errorCode' > /dev/null 2>&1; then
            echo "❌ Fabric Git status API error:"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "workspace_head=$WORKSPACE_HEAD" >> $GITHUB_OUTPUT
          echo "remote_hash=$REMOTE_HASH" >> $GITHUB_OUTPUT

          if [ "$WORKSPACE_HEAD" = "$REMOTE_HASH" ]; then
            echo "✅ Fabric is already up to date with remote. No sync needed."
            echo "in_sync=true" >> $GITHUB_OUTPUT
          else
            echo "🔄 Changes detected. Sync required."
            echo "in_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Fabric workspace from Git
        if: steps.git_status.outputs.in_sync == 'false'
        run: |
          WORKSPACE_HEAD="${{ steps.git_status.outputs.workspace_head }}"
          REMOTE_HASH="${{ steps.git_status.outputs.remote_hash }}"

          # When workspaceHead is null the workspace was never synced — use initializeConnection.
          # For subsequent syncs, use updateFromGit.
          if [ "$WORKSPACE_HEAD" = "null" ] || [ -z "$WORKSPACE_HEAD" ]; then
            echo "ℹ️ workspaceHead is null — using initializeConnection (first-time sync)."
            ENDPOINT="https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/git/initializeConnection"
            BODY=$(jq -n \
              '{initializationStrategy: "PreferRemote"}')
          else
            echo "ℹ️ workspaceHead found — using updateFromGit."
            ENDPOINT="https://api.fabric.microsoft.com/v1/workspaces/${{ secrets.FABRIC_WORKSPACE_ID }}/git/updateFromGit"
            BODY=$(jq -n \
              --arg wh "$WORKSPACE_HEAD" \
              --arg rch "$REMOTE_HASH" \
              '{workspaceHead:$wh,remoteCommitHash:$rch,conflictResolution:{conflictResolutionType:"Workspace",conflictResolutionPolicy:"PreferRemote"},options:{allowOverrideItems:true}}')
          fi

          # Capture response headers to get the Location for LRO polling
          RESPONSE=$(curl -s -i -w "\n%{http_code}" -X POST \
            "$ENDPOINT" \
            -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          LOCATION=$(echo "$RESPONSE" | grep -i "^location:" | awk '{print $2}' | tr -d '\r')

          echo "HTTP status: $HTTP_CODE"
          echo "Operation location: $LOCATION"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Fabric workspace updated successfully."
          elif [ "$HTTP_CODE" = "202" ]; then
            echo "🔄 Sync accepted as long-running operation. Polling for completion..."
            if [ -z "$LOCATION" ]; then
              echo "❌ No Location header returned — cannot poll operation status."
              exit 1
            fi
            # Poll until succeeded or failed
            for i in $(seq 1 20); do
              sleep 15
              OP=$(curl -s \
                "$LOCATION" \
                -H "Authorization: Bearer ${{ steps.get_token.outputs.token }}")
              STATUS=$(echo "$OP" | jq -r '.status // "unknown"')
              echo "Poll $i — status: $STATUS"
              if [ "$STATUS" = "Succeeded" ]; then
                echo "✅ Fabric workspace sync completed successfully."
                break
              elif [ "$STATUS" = "Failed" ]; then
                echo "❌ Fabric workspace sync failed:"
                echo "$OP" | jq .
                exit 1
              fi
            done
            if [ "$STATUS" != "Succeeded" ]; then
              echo "❌ Timed out waiting for Fabric sync to complete."
              exit 1
            fi
          else
            echo "❌ Unexpected response from Fabric API."
            exit 1
          fi
